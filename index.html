<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Book Tracker</h1>
    <div id="stats-strip">
      <span class="stat"><span id="stat-total">--</span> listened</span>
      <span class="stat"><span id="stat-loved">--</span> loved</span>
      <span class="stat"><span id="stat-queue">--</span> to listen</span>
      <button id="export-btn" class="btn-export" title="Export books to JSON">Export</button>
    </div>
  </header>

  <main>

    <!-- Add Book -->
    <section id="add-section">
      <button id="toggle-form-btn" class="btn-primary">+ Add</button>

      <form id="book-form" class="hidden">
        <h2 id="form-title">Add</h2>
        <input type="hidden" id="edit-id">

        <div class="form-row">
          <label>Title *
            <input type="text" id="f-title" placeholder="Title" required>
          </label>
          <label>Author *
            <input type="text" id="f-author" placeholder="Author" required>
          </label>
        </div>

        <div class="form-row">
          <label>Series
            <input type="text" id="f-series" placeholder="Series name (optional)">
          </label>
          <label># in series
            <input type="number" id="f-series-order" placeholder="e.g. 1" min="1">
          </label>
        </div>

        <div class="form-row">
          <label>Status
            <select id="f-status">
              <option value="listened">Listened</option>
              <option value="want_to_listen">Want to Listen</option>
            </select>
          </label>
          <label>Recommended by
            <input type="text" id="f-recommended-by" placeholder="e.g. Claude, Dan">
          </label>
        </div>

        <div class="form-row">
          <label>Format
            <select id="f-format">
              <option value="audiobook">Audiobook</option>
              <option value="book">Book</option>
            </select>
          </label>
          <label id="rating-label">Rating
            <select id="f-rating">
              <option value="">-- select --</option>
              <option value="loved">Loved</option>
              <option value="great">Great</option>
              <option value="very_good">Very Good</option>
              <option value="decent">Decent</option>
              <option value="average">Average</option>
              <option value="disliked">Disliked</option>
              <option value="dnf">DNF (Did Not Finish)</option>
            </select>
          </label>
        </div>

        <div class="form-row" id="listened-fields">
          <label>Date finished
            <input type="date" id="f-date">
          </label>
          <label>Notes
            <input type="text" id="f-notes" placeholder="Optional notes">
          </label>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary" id="form-submit-btn">Add</button>
          <button type="button" id="cancel-form-btn" class="btn-secondary">Cancel</button>
        </div>
      </form>
    </section>

    <!-- Filters -->
    <section id="filter-section">
      <div class="filter-bar">
        <select id="filter-status">
          <option value="">All</option>
          <option value="listened">Listened</option>
          <option value="want_to_listen">To Listen</option>
        </select>

        <select id="filter-rating">
          <option value="">All ratings</option>
          <option value="loved">Loved</option>
          <option value="great">Great</option>
          <option value="very_good">Very Good</option>
          <option value="decent">Decent</option>
          <option value="average">Average</option>
          <option value="disliked">Disliked</option>
          <option value="dnf">DNF</option>
        </select>

        <select id="filter-format">
          <option value="">All formats</option>
          <option value="audiobook">Audiobook</option>
          <option value="book">Book</option>
        </select>

        <select id="sort-by">
          <option value="date_added">Recently added</option>
          <option value="rating">Rating</option>
          <option value="author">Author</option>
          <option value="title">Title</option>
        </select>
      </div>
    </section>

    <!-- Book List -->
    <section id="books-section">
      <div id="book-list"></div>
    </section>

    <p class="recommend-note">
      For recommendations, run <code>/book-recommend</code> in Claude Code.
    </p>

  </main>

  <!-- Delete confirm dialog -->
  <dialog id="delete-dialog">
    <p id="delete-msg">Delete this book?</p>
    <div class="dialog-actions">
      <button id="confirm-delete-btn" class="btn-danger">Delete</button>
      <button id="cancel-delete-btn" class="btn-secondary">Cancel</button>
    </div>
  </dialog>

  <script src="app.js"></script>

</body>
</html>
